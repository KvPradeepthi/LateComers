services:
  # Backend Node.js Web Service
  - type: web
    name: latecomers-backend
    env: node
    plan: free
    rootDir: Latecomers_Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DBURL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend React Static Site
  - type: web
    name: latecomers-frontend
    env: static
    rootDir: Latecomers_Frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: build
    envVars:
      - key: REACT_APP_API
        sync: false
