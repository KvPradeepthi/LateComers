services:
  # Backend Node.js Web Service
  - type: web
    name: latecomers-backend
    env: node
    plan: free
    rootDir: Latecomers_Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DBURL
      - key: GEMINI_API_KEY
      - key: MAIL_HOST
        value: smtp.office365.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USER
      - key: MAIL_PASS

  # Frontend React Static Site
  - type: web
    name: latecomers-frontend
    env: static
    plan: free
    rootDir: Latecomers_Frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: build
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    envVars:
      - key: REACT_APP_API
        fromService:
          type: web
          name: latecomers-backend
          property: host
